name: smoke

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  docker-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build versioned image
        run: |
          version=$(<VERSION)
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            test "${GITHUB_REF_NAME}" = "v${version}"
          fi
          ./build.sh

      - name: Convert minimal Markdown with Mermaid
        run: |
          mkdir -p \
            "${RUNNER_TEMP}/md2pdf-smoke/input" \
            "${RUNNER_TEMP}/md2pdf-smoke/double" \
            "${RUNNER_TEMP}/md2pdf-smoke/single"
          printf '# Smoke test\n\n## 中文章节\n\n中文排版\n\n```mermaid\nflowchart LR\n  A --> B\n```\n' \
            > "${RUNNER_TEMP}/md2pdf-smoke/input/smoke.md"
          ./md2pdf.sh -d \
            "${RUNNER_TEMP}/md2pdf-smoke/input/smoke.md" \
            "${RUNNER_TEMP}/md2pdf-smoke/double"
          ./md2pdf.sh -s -f \
            "${RUNNER_TEMP}/md2pdf-smoke/input/smoke.md" \
            "${RUNNER_TEMP}/md2pdf-smoke/single"
          for pdf in \
            "${RUNNER_TEMP}/md2pdf-smoke/double/smoke.pdf" \
            "${RUNNER_TEMP}/md2pdf-smoke/single/smoke.pdf"; do
            test -s "${pdf}"
            file "${pdf}" | grep -F 'PDF document'
          done

      - name: Verify image tags and runtime security flags
        run: |
          version=$(<VERSION)
          docker image inspect md2pdf:latest >/dev/null
          docker image inspect "md2pdf:${version}" >/dev/null
          test "$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.version" }}' md2pdf:latest)" = "${version}"
          test "$(docker image inspect --format '{{.Os}}/{{.Architecture}}' md2pdf:latest)" = "linux/amd64"
          grep -F -- '--network none' md2pdf.sh
          grep -F -- '--read-only' md2pdf.sh
          grep -F -- '--tmpfs /tmp:rw,nosuid,nodev,noexec,size=512m' md2pdf.sh
          grep -F -- '--tmpfs /run:rw,nosuid,nodev,noexec,size=64m' md2pdf.sh
          grep -F -- '--security-opt no-new-privileges' md2pdf.sh
          ./md2pdf.sh --help 2>&1 | grep -F -- '-s, --single-sided'
          ./md2pdf.sh --help 2>&1 | grep -F -- '-d, --double-sided'
          ./md2pdf.sh --help 2>&1 | grep -F -- '-f, --front-matter'
          grep -F -- '--variable geometry:top=2cm' docker/convert.sh
          grep -F -- '--variable geometry:bottom=2cm' docker/convert.sh
          grep -F -- '--variable geometry:left=2cm' docker/convert.sh
          grep -F -- '--variable geometry:right=1cm' docker/convert.sh
          grep -F -- '--variable geometry:inner=2cm' docker/convert.sh
          grep -F -- '--variable geometry:outer=1cm' docker/convert.sh
          grep -F -- '\fancyfoot[R]{\thepage{} / \zpageref{LastPage}}' docker/convert.sh
          grep -F -- '\fancyfoot[LE,RO]{\thepage{} / \zpageref{LastPage}}' docker/convert.sh
          grep -F -- '--toc' docker/convert.sh
